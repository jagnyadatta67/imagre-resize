{% extends "base.html" %}
{% block title %}SKU Not Found{% endblock %}

{% block content %}
<div class="card text-center py-20 max-w-lg mx-auto mt-10">
  <p class="text-6xl mb-4">🔍</p>
  <h1 class="text-2xl font-bold text-gray-700 mb-2">SKU Not Found</h1>
  <p class="text-gray-400 text-sm mb-6">
    <code class="bg-gray-100 px-2 py-1 rounded font-mono text-gray-600">{{ sku_id }}</code>
    has not been processed yet, or does not exist.
  </p>
  <a href="/" class="btn-primary">← Back to Dashboard</a>
</div>
{% endblock %}
